<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dejar Opinión - Book&Go AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.65);
            --primary-gradient: linear-gradient(135deg, #6366f1, #a855f7);
            --accent: #8b5cf6;
        }
        
        body {
            background-color: var(--bg-dark);
            /* Luces de neón difuminadas en el fondo */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.15), transparent 25%);
            background-attachment: fixed;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Tarjeta con efecto cristal (Glassmorphism) */
        .opinion-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Brillo sutil en el borde superior de la tarjeta */
        .opinion-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        /* Insignia del usuario logueado */
        .user-badge {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
            padding: 12px 16px;
        }

        /* Animación y brillo de las estrellas */
        .star-rating i {
            font-size: 2.5rem;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .star-rating i:hover {
            transform: scale(1.15);
        }
        .star-rating i.active {
            color: #fbbf24;
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
        }

        /* Cuadro de texto flotante */
        .custom-textarea {
            background: rgba(0, 0, 0, 0.25) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            color: white !important;
            border-radius: 1rem;
            resize: none;
            transition: all 0.3s ease;
        }
        .custom-textarea:focus {
            border-color: var(--accent) !important;
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15) !important;
            background: rgba(0, 0, 0, 0.4) !important;
        }
        .custom-textarea::placeholder {
            color: #64748b !important;
        }

        /* Botón con sombra 3D */
        .btn-gradient {
            background: var(--primary-gradient);
            color: white;
            border: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.8);
            color: white;
        }
        
        /* Botón de regresar minimalista */
        .btn-back {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s;
        }
        .btn-back:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="container p-3 d-flex justify-content-center">
        <div class="opinion-card p-4 p-md-5">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <a href="index.html" class="btn-back">
                    <i class="bi bi-arrow-left me-1"></i> Volver al inicio
                </a>
            </div>

            <div class="text-center mb-4">
                <div class="bg-primary bg-gradient text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 56px; height: 56px;">
                    <i class="bi bi-stars fs-3"></i>
                </div>
                <h3 class="fw-bold mb-1">Tu opinión cuenta</h3>
                <p class="text-muted small">Cuéntanos cómo fue tu experiencia planificando con IA.</p>
            </div>

            <div id="auth-check-view" class="text-center py-4">
                <div class="spinner-grow text-primary mb-3" style="width: 3rem; height: 3rem;" role="status"></div>
                <p class="text-muted small">Conectando con tu cuenta...</p>
            </div>

            <form id="opinionForm" class="d-none">
                
                <div class="user-badge d-flex align-items-center gap-3 mb-4">
                    <img id="userAvatar" src="" class="rounded-circle border border-2 border-light border-opacity-25" width="48" height="48" alt="Usuario">
                    <div>
                        <h6 id="userName" class="fw-bold mb-0">Cargando...</h6>
                        <small id="userEmail" class="text-light text-opacity-50"></small>
                    </div>
                </div>

                <div class="mb-4 text-center">
                    <label class="form-label d-block small text-light text-opacity-75 fw-semibold mb-3">¿Cuántas estrellas le das a tu itinerario?</label>
                    <div class="star-rating d-flex justify-content-center gap-2" id="starContainer">
                        <i class="bi bi-star-fill" data-value="1"></i>
                        <i class="bi bi-star-fill" data-value="2"></i>
                        <i class="bi bi-star-fill" data-value="3"></i>
                        <i class="bi bi-star-fill" data-value="4"></i>
                        <i class="bi bi-star-fill" data-value="5"></i>
                    </div>
                </div>

                <div class="mb-4">
                    <textarea id="opinionText" class="form-control custom-textarea p-3" rows="4" placeholder="¡Me encantaron las recomendaciones! Ahorré mucho tiempo y descubrí lugares nuevos..." required></textarea>
                </div>

                <button type="submit" class="btn btn-gradient w-100 py-3 rounded-pill fw-bold">
                    <i class="bi bi-send-fill me-2"></i> Publicar reseña
                </button>
            </form>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        // Importamos Realtime Database
        import { getDatabase, ref, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        // IMPORTANTE: Se agregó 'databaseURL' para Realtime Database
        const firebaseConfig = {
            apiKey: "AIzaSyBY0KCEgBwrKV02kiFTGZLtWOxO9ozzSso",
            authDomain: "bookandgo-ad08d.firebaseapp.com",
            databaseURL: "https://bookandgo-ad08d-default-rtdb.firebaseio.com",
            projectId: "bookandgo-ad08d",
            storageBucket: "bookandgo-ad08d.firebasestorage.app",
            messagingSenderId: "772819367761",
            appId: "1:772819367761:web:5fdf584737cf2ea3ad8570",
            measurementId: "G-NZKR4SKYC6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app); // Iniciamos Realtime DB

        let selectedStars = 5; 
        let currentUserData = null;

        const authCheckView = document.getElementById('auth-check-view');
        const opinionForm = document.getElementById('opinionForm');

        // Lógica de estrellas
        const stars = document.querySelectorAll('#starContainer i');
        stars.forEach(star => {
            star.classList.add('active');
            star.addEventListener('click', (e) => {
                selectedStars = parseInt(e.target.getAttribute('data-value'));
                updateStarsVisuals(selectedStars);
            });
        });

        function updateStarsVisuals(value) {
            stars.forEach(star => {
                const starValue = parseInt(star.getAttribute('data-value'));
                if (starValue <= value) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        // Control de Sesión
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserData = user;
                authCheckView.classList.add('d-none');
                opinionForm.classList.remove('d-none');

                const cleanName = user.displayName ? user.displayName : user.email.split('@')[0];
                document.getElementById('userName').textContent = cleanName;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userAvatar').src = user.photoURL ? user.photoURL : `https://ui-avatars.com/api/?name=${cleanName}&background=6366f1&color=fff`;
            } else {
                window.location.href = 'index.html?action=loginRequired';
            }
        });

        // ENVIAR RESEÑA A REALTIME DATABASE
        document.getElementById('opinionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = document.getElementById('opinionText').value;
            const cleanName = currentUserData.displayName ? currentUserData.displayName : currentUserData.email.split('@')[0];

            try {
                // Creamos la referencia al nodo 'opiniones' y hacemos push
                const opinionesRef = ref(database, 'opiniones');
                await push(opinionesRef, {
                    userName: cleanName,
                    userEmail: currentUserData.email,
                    userPhoto: currentUserData.photoURL ? currentUserData.photoURL : `https://ui-avatars.com/api/?name=${cleanName}&background=6366f1&color=fff`,
                    stars: selectedStars,
                    text: text,
                    createdAt: serverTimestamp()
                });

                alert("¡Tu reseña se ha publicado con éxito de forma real!");
                window.location.href = 'index.html'; 

            } catch (error) {
                console.error("Error al guardar en Realtime DB: ", error);
                alert("Hubo un problema al subir tu reseña. Inténtalo de nuevo.");
            }
        });
    </script>
</body>
</html>
